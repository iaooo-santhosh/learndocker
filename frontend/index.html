<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Docker Task Tracker</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; }
    li { margin: 4px 0; }
    #health { color: #666; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Task Tracker</h1>
  <p id="health">checking health...</p>

  <form id="task-form">
    <input id="title" type="text" placeholder="New task" required />
    <button type="submit">Add</button>
  </form>
  <ul id="tasks"></ul>

  <script>
    async function loadHealth() {
      const res = await fetch('/api/health');
      const data = await res.json();
      document.getElementById('health').textContent =
        `backend status: ${data.status} | redis hit count: ${data.hits}`;
    }

    async function loadTasks() {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      const ul = document.getElementById('tasks');
      ul.innerHTML = '';
      tasks.forEach(t => {
        const li = document.createElement('li');
        li.textContent = `#${t.id} - ${t.title}`;
        ul.appendChild(li);
      });
    }

    document.getElementById('task-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('title');
      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: input.value }),
      });
      input.value = '';
      loadTasks();
    });

    loadHealth();
    loadTasks();
  </script>
</body>
</html>
