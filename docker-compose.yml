services:
  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    environment:
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: "3306"
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpass
      MYSQL_DATABASE: tasksdb
      REDIS_HOST: redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      - backend
